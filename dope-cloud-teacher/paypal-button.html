<!-- PayPal Button Integration (Sample) -->
<!-- Replace with your real PayPal client ID and product details -->
<div id="paypal-button-container" style="margin:2rem 0;"></div>
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=USD"></script>
<script>
  if (window.paypal) {
    paypal.Buttons({
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: { value: '297.00' },
            description: 'Cloud Fundamentals 101 Course Access'
          }]
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          alert('Thank you, ' + details.payer.name.given_name + '! Your payment was successful.');
          // TODO: Grant course access in backend
        });
      }
    }).render('#paypal-button-container');
  }
</script>
<!-- /PayPal Button Integration -->
