    <rect x="72" y="450" width="120" height="70" rx="8" fill="#e9fff4"/>
    <text x="206" y="475" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Flyer:</text>
    <text x="206" y="497" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Big CTA</text>
    <text x="206" y="519" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Offer + date</text>
    <text x="72" y="560" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Instagram post</text>
    <text x="72" y="584" font-size="14" font-family="Segoe UI, Arial" fill="#163047">TikTok caption</text>
    <text x="72" y="608" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Facebook post</text>
