    <text x="664" y="562" font-size="24" font-family="Segoe UI, Arial" fill="#163047" font-weight="700">Customer: ___   Why us: ___</text>
    <text x="664" y="598" font-size="22" font-family="Segoe UI, Arial" fill="#0f5e39" font-weight="800">Shark Tank Time: 60 seconds</text>
