    <text x="625" y="170" font-size="16" font-family="Segoe UI, Arial" fill="#163047" font-weight="700">Prompt:</text>
    <text x="625" y="198" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Business name</text>
    <text x="625" y="220" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Slogan</text>
    <text x="625" y="242" font-size="14" font-family="Segoe UI, Arial" fill="#163047">Mission</text>
  </g>

  <g>
    <circle cx="905" cy="180" r="40" fill="#5d4037"/>
    <rect x="860" y="225" width="90" height="62" rx="16" fill="#0f5e39"/>
    <rect x="995" y="125" width="150" height="165" rx="12" fill="#fff" stroke="#163047" stroke-width="4"/>
    <rect x="1010" y="143" width="120" height="66" rx="8" fill="#e9fff4"/>
