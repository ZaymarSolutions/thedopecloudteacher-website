  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>

  <g fill="none" stroke="#163047" stroke-width="6" stroke-linejoin="round">
    <rect x="30" y="30" width="360" height="300" rx="18"/>
    <rect x="420" y="30" width="360" height="300" rx="18"/>
    <rect x="810" y="30" width="360" height="300" rx="18"/>
    <rect x="30" y="360" width="360" height="330" rx="18"/>
    <rect x="420" y="360" width="750" height="330" rx="18"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#163047">
    <text x="52" y="68" font-size="30" font-weight="800">Panel 1: Idea Spark</text>
    <text x="442" y="68" font-size="30" font-weight="800">Panel 2: Prompt Build</text>
    <text x="832" y="68" font-size="30" font-weight="800">Panel 3: Brand Drop</text>
    <text x="52" y="398" font-size="30" font-weight="800">Panel 4: Flyer + Social</text>
    <text x="442" y="398" font-size="30" font-weight="800">Panel 5: 60-Second Pitch</text>
  </g>

  <g>
